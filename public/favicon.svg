<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#8b5cf6" stroke-width="0.75" opacity="0.4"/>
  <!-- Cardinal ticks -->
  <line x1="16" y1="3" x2="16" y2="6" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="26" x2="16" y2="29" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <line x1="3" y1="16" x2="6" y2="16" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="16" x2="29" y2="16" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <!-- Compass needle — north (accent) -->
  <polygon points="16,5 14,16 18,16" fill="#8b5cf6"/>
  <!-- Compass needle — south (dim) -->
  <polygon points="16,27 14,16 18,16" fill="#475569"/>
  <!-- Compass needle — east (dim) -->
  <polygon points="27,16 16,14 16,18" fill="#475569" opacity="0.5"/>
  <!-- Compass needle — west (dim) -->
  <polygon points="5,16 16,14 16,18" fill="#475569" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#8b5cf6"/>
</svg>
